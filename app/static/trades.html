<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trades - Polymarket AI Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #e4e4e7; }
        
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; z-index: 100; }
        .logo { padding: 10px 0 30px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .logo h2 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #a1a1aa; text-decoration: none; border-radius: 10px; margin-bottom: 8px; transition: all 0.3s; font-size: 14px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: rgba(124,58,237,0.2); color: #fff; }
        .main-content { margin-left: 260px; padding: 30px; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 600; }
        
        .trades-table { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px 24px; font-size: 12px; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; background: rgba(0,0,0,0.2); }
        td { padding: 16px 24px; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
        
        .side-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .side-badge.yes { background: rgba(74,222,128,0.2); color: #4ade80; }
        .side-badge.no { background: rgba(248,113,113,0.2); color: #f87171; }
        
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-badge.completed { background: rgba(74,222,128,0.2); color: #4ade80; }
        .status-badge.pending { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .status-badge.failed { background: rgba(248,113,113,0.2); color: #f87171; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #71717a; }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        
        .refresh-btn { padding: 8px 16px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 14px; }
        .refresh-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><h2><i class="fas fa-robot"></i> PolyAI Trader</h2></div>
        <nav>
            <a href="/dashboard" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="/markets" class="nav-item"><i class="fas fa-chart-pie"></i> Markets</a>
            <a href="/trades" class="nav-item active"><i class="fas fa-history"></i> Trades</a>
            <a href="/settings" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Trade History</h1>
            <button class="refresh-btn" onclick="loadTrades()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
        
        <div class="trades-table">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Market</th>
                        <th>Side</th>
                        <th>Amount</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Tx Hash</th>
                    </tr>
                </thead>
                <tbody id="tradesTable">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fas fa-history"></i>
                            <p>Loading trades...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        
        async function loadTrades() {
            const headers = { 'Authorization': `Bearer ${token}` };
            try {
                const trades = await fetch('/api/trades?limit=100', { headers }).then(r => r.json());
                renderTrades(trades);
            } catch (err) {
                document.getElementById('tradesTable').innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading trades</p></td></tr>`;
            }
        }
        
        function renderTrades(trades) {
            if (!trades || trades.length === 0) {
                document.getElementById('tradesTable').innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox"></i><p>No trades yet</p></td></tr>`;
                return;
            }
            
            document.getElementById('tradesTable').innerHTML = trades.map(t => {
                const time = new Date(t.created_at).toLocaleString();
                const amount = `$${t.amount.toFixed(2)}`;
                const price = `$${t.price.toFixed(2)}`;
                const tx = t.tx_hash ? `<code style="font-size: 11px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">${t.tx_hash.substring(0, 12)}...</code>` : '-';
                
                return `
                <tr>
                    <td>${time}</td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${t.market_question || t.market_id}</td>
                    <td><span class="side-badge ${t.side}">${t.side.toUpperCase()}</span></td>
                    <td>${amount}</td>
                    <td>${price}</td>
                    <td><span class="status-badge ${t.status}">${t.status.toUpperCase()}</span></td>
                    <td>${tx}</td>
                </tr>
                `;
            }).join('');
        }
        
        loadTrades();
        setInterval(loadTrades, 30000);
    </script>
</body>
</html>
