version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: polymarket_postgres
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket_pass_2024
      POSTGRES_DB: polymarket_trader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: polymarket_bot
    ports:
      - "8888:8000"
    environment:
      - DATABASE_URL=postgresql://polymarket:polymarket_pass_2024@postgres:5432/polymarket_trader
      - SECRET_KEY=polymarket_secret_key_change_in_production_2024
      - POLYMARKET_API_URL=https://clob.polymarket.com
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

volumes:
  postgres_data:
